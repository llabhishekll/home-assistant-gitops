apiVersion: apps/v1
kind: Deployment

metadata:
  name: uptime-kuma
  labels:
    app: uptime-kuma

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:1

          env:
            - name: TZ
              value: "Asia/Kolkata"

          ports:
            - containerPort: 3001
              name: http

          volumeMounts:
            - name: data-volume
              mountPath: /app/data

          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: uptime-kuma-data-pvc