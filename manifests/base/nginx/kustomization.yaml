apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - tls-secret.yaml

configMapGenerator:
  - name: nginx-proxy-config
    files:
      - config/nginx.conf

secretGenerator:
  - name: nginx-proxy-tls
    files:
      - config/nginx-selfsigned.crt
      - config/nginx-selfsigned.key