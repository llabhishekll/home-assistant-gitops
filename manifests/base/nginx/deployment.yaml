apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-proxy
  labels:
    app: nginx-proxy

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nginx-proxy

  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      containers:
        - name: nginx-proxy
          image: nginx:stable-alpine

          ports:
            - containerPort: 80
            - containerPort: 443

          volumeMounts:
            # Mount the main routing config
            - name: config-volume
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf 

            # Mount the TLS certificates from the secret volume
            - name: tls-volume
              mountPath: /etc/nginx/ssl/nginx-selfsigned.crt
              subPath: tls.crt

            - name: tls-volume
              mountPath: /etc/nginx/ssl/nginx-selfsigned.key
              subPath: tls.key

          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"

      volumes:
        - name: config-volume
          configMap:
            name: nginx-proxy-config
        - name: tls-volume
          secret:
            secretName: nginx-proxy-tls