apiVersion: apps/v1
kind: Deployment

metadata:
  name: home-assistant
  labels:
    app: home-assistant

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      hostNetwork: true
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:stable

          securityContext:
            privileged: false
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_ADMIN

          env:
            - name: TZ
              value: "Asia/Kolkata"

          # Matches Compose healthcheck perfectly
          startupProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:8123
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:8123
            periodSeconds: 30
            timeoutSeconds: 10

          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: dbus
              mountPath: /run/dbus
              readOnly: true
            - name: dev
              mountPath: /dev
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true

          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "2Gi"
              cpu: "500m"

      volumes:
        - name: config-volume
          persistentVolumeClaim:
            claimName: home-assistant-pvc
        - name: dbus
          hostPath:
            path: /run/dbus
            type: Directory
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File