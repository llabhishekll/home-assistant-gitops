apiVersion: apps/v1
kind: Deployment

metadata:
  name: immich
  labels:
    app: immich

spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich
  template:
    metadata:
      labels:
        app: immich
    spec:
      containers:
        - name: server
          image: ghcr.io/immich-app/immich-server:release
          env:
            - name: TZ
              value: "Asia/Kolkata"
            - name: DB_HOSTNAME
              value: "localhost"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_DATABASE_NAME
              value: "immich"
            - name: REDIS_HOSTNAME
              value: "localhost"
            - name: IMMICH_MACHINE_LEARNING_URL
              value: "http://localhost:3003"
          ports:
            - containerPort: 2283
              name: http
          volumeMounts:
            - name: host-volume
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

        - name: machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:release
          env:
            - name: TZ
              value: "Asia/Kolkata"
          volumeMounts:
            - name: model-cache-volume
              mountPath: /cache
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "2000m"

        - name: redis
          image: redis:6.2-alpine
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"

        - name: postgres
          image: tensorchord/pgvecto-rs:pg14-v0.2.0
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "immich"
          volumeMounts:
            - name: postgres-volume
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

      volumes:
        - name: postgres-volume
          persistentVolumeClaim:
            claimName: immich-db-pvc
        - name: model-cache-volume
          persistentVolumeClaim:
            claimName: immich-model-cache-pvc
        - name: host-volume
          hostPath:
            path: /tmp/immich-host-volume
            type: DirectoryOrCreate