apiVersion: v1
kind: Service

metadata:
  name: home-basket-service
  labels:
    app: home-basket

  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8123"
    prometheus.io/path: "/api/prometheus"

spec:
  type: ClusterIP

  selector:
    app: home-basket

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
