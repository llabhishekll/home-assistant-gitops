apiVersion: apps/v1
kind: Deployment

metadata:
  name: homepage
  labels:
    app: homepage

spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest

          env:
            - name: TZ
              value: "Asia/Kolkata"
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"

          ports:
            - containerPort: 3000
              name: http

          volumeMounts:
            - name: config-volume
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
              readOnly: true
            - name: config-volume
              mountPath: /app/config/services.yaml
              subPath: services.yaml
              readOnly: true
            - name: config-volume
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
              readOnly: true
            - name: config-volume
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
              readOnly: true

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      volumes:
        - name: config-volume
          configMap:
            name: homepage-config