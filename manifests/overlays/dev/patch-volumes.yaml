# Jellyfin Volume Override
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  # Added to satisfy strict schema validation
  selector:
    matchLabels:
      app: jellyfin
  template:
    spec:
      containers:
        - name: jellyfin 
      volumes:
        - name: host-volume
          hostPath:
            path: /tmp/dev-k3s-mounts/immich-host-volume
            type: DirectoryOrCreate

