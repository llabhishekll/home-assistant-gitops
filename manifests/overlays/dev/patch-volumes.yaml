---
# Immich Volume Override
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
spec:
  # Added to satisfy strict schema validation
  selector:
    matchLabels:
      app: immich
  template:
    spec:
      containers:
        - name: server
      volumes:
        - name: host-volume
          hostPath:
            path: /tmp/dev-k3s-mounts/jellyfin-host-volume
            type: DirectoryOrCreate